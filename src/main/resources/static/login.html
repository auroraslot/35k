<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetCode 刷题追踪器 - 登录</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .login-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 400px;
            max-width: 90vw;
        }

        .login-card h1 {
            text-align: center;
            color: #333;
            font-size: 1.6em;
            margin-bottom: 8px;
        }

        .login-card .subtitle {
            text-align: center;
            color: #888;
            font-size: 0.9em;
            margin-bottom: 30px;
        }

        .tab-bar {
            display: flex;
            border-bottom: 2px solid #eee;
            margin-bottom: 24px;
        }

        .tab-bar .tab {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            cursor: pointer;
            font-size: 1em;
            color: #999;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }

        .tab-bar .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.9em;
            color: #555;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: #667eea;
        }

        .submit-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .submit-btn:hover { opacity: 0.9; }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .message {
            margin-top: 16px;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.9em;
            display: none;
        }

        .message.error { background: #ffeef0; color: #d32f2f; border: 1px solid #ffcdd2; }
        .message.success { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }

        .form-panel { display: none; }
        .form-panel.active { display: block; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>🎯 LeetCode 刷题追踪器</h1>
        <p class="subtitle">登录后同步你的刷题进度</p>

        <div class="tab-bar">
            <div class="tab active" data-tab="login">登录</div>
            <div class="tab" data-tab="register">注册</div>
        </div>

        <div id="login-panel" class="form-panel active">
            <form id="login-form">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" name="username" required autocomplete="username" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" name="password" required autocomplete="current-password" placeholder="请输入密码">
                </div>
                <button type="submit" class="submit-btn">登 录</button>
            </form>
            <div id="login-msg" class="message"></div>
        </div>

        <div id="register-panel" class="form-panel">
            <form id="register-form">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" name="username" required autocomplete="username" placeholder="至少2个字符">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" name="password" required autocomplete="new-password" placeholder="至少4个字符">
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" name="confirm" required autocomplete="new-password" placeholder="再次输入密码">
                </div>
                <button type="submit" class="submit-btn">注 册</button>
            </form>
            <div id="register-msg" class="message"></div>
        </div>
    </div>

    <script>
        $(function () {
            // Tab switching
            $('.tab').click(function () {
                var tab = $(this).data('tab');
                $('.tab').removeClass('active');
                $(this).addClass('active');
                $('.form-panel').removeClass('active');
                $('#' + tab + '-panel').addClass('active');
                $('.message').hide();
            });

            function showMsg(id, text, type) {
                var $m = $('#' + id);
                $m.removeClass('error success').addClass(type).text(text).show();
            }

            // Login
            $('#login-form').submit(function (e) {
                e.preventDefault();
                var $btn = $(this).find('.submit-btn');
                $btn.prop('disabled', true).text('登录中...');

                $.ajax({
                    url: '/api/auth/login',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({
                        username: $(this).find('[name=username]').val(),
                        password: $(this).find('[name=password]').val()
                    }),
                    success: function (res) {
                        if (res.code === 0) {
                            showMsg('login-msg', '登录成功，正在跳转...', 'success');
                            setTimeout(function () { window.location.href = '/leetcode-tracker'; }, 500);
                        } else {
                            showMsg('login-msg', res.message, 'error');
                            $btn.prop('disabled', false).text('登 录');
                        }
                    },
                    error: function () {
                        showMsg('login-msg', '网络错误，请重试', 'error');
                        $btn.prop('disabled', false).text('登 录');
                    }
                });
            });

            // Register
            $('#register-form').submit(function (e) {
                e.preventDefault();
                var pw = $(this).find('[name=password]').val();
                var cf = $(this).find('[name=confirm]').val();
                if (pw !== cf) {
                    showMsg('register-msg', '两次密码输入不一致', 'error');
                    return;
                }

                var $btn = $(this).find('.submit-btn');
                $btn.prop('disabled', true).text('注册中...');

                $.ajax({
                    url: '/api/auth/register',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({
                        username: $(this).find('[name=username]').val(),
                        password: pw
                    }),
                    success: function (res) {
                        if (res.code === 0) {
                            showMsg('register-msg', '注册成功，正在跳转...', 'success');
                            setTimeout(function () { window.location.href = '/leetcode-tracker'; }, 500);
                        } else {
                            showMsg('register-msg', res.message, 'error');
                            $btn.prop('disabled', false).text('注 册');
                        }
                    },
                    error: function () {
                        showMsg('register-msg', '网络错误，请重试', 'error');
                        $btn.prop('disabled', false).text('注 册');
                    }
                });
            });

            // If already logged in, redirect
            $.get('/api/auth/status', function (res) {
                if (res.data && res.data.loggedIn) {
                    window.location.href = '/leetcode-tracker';
                }
            });
        });
    </script>
</body>
</html>
