                // 解析markdown表格
                const lines = markdownContent.split('\n');
                let currentStage = '';
                let currentWeek = '';
                let currentDay = '';
                let isInTable = false;

                problems = [];

                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();

                    // 检测阶段标题
                    if (line.startsWith('## ')) {
                        currentStage = line.substring(3);
                        currentWeek = '';
                        currentDay = '';
                        continue;
                    }

                    // 检测周标题
                    if (line.startsWith('### ')) {
                        currentWeek = line.substring(4);
                        currentDay = '';
                        continue;
                    }

                    // 检测天标题
                    if (line.startsWith('#### ')) {
                        currentDay = line.substring(5);
                        isInTable = false;
                        continue;
                    }

                    // 检测表格开始（表头行）
                    if (line.includes('| 题号 | 题目 | 难度 | 标签 | 备注 |')) {
                        isInTable = true;
                        continue;
                    }

                    // 解析表格数据行
                    if (isInTable && line.includes('|') && !line.includes('---') && !line.includes('题号')) {
                        const parts = line.split('|').map(part => part.trim());
                        // 移除开头和结尾的空部分（表格边框）
                        if (parts.length > 0 && parts[0] === '') parts.shift();
                        if (parts.length > 0 && parts[parts.length - 1] === '') parts.pop();
                        if (parts.length >= 5) {
                            const number = parseInt(parts[0]);

                            // 解析题目链接格式：[标题](URL) - 处理可能换行的URL
                            let title = parts[1];
                            let slug = '';

                            // 处理换行的URL：检查当前行和下一行
                            if (!title.includes(')') && i + 1 < lines.length) {
                                // URL被换行了，合并下一行
                                const nextLine = lines[i + 1].trim();
                                if (nextLine.startsWith('/)') || nextLine.includes(')')) {
                                    title += nextLine;
                                    i++; // 跳过下一行，因为已经处理了
                                }
                            }

                            const linkMatch = title.match(/\[([^\]]+)\]\(([^)]+)\)/);
                            if (linkMatch) {
                                title = linkMatch[1]; // 提取标题
                                const url = linkMatch[2]; // 提取URL
                                // 从URL中提取slug，比如 https://leetcode.cn/problems/two-sum/ -> two-sum
                                const slugMatch = url.match(/problems\/([^\/]+)\//);
                                if (slugMatch) {
                                    slug = slugMatch[1];
                                }
                            }

                            const difficulty = parts[2];
                            const tags = parts[3];
                            const notes = parts[4];

                            // 调试：记录解析过程
                            if (!isNaN(number)) {
                                if (title && title !== parts[1]) { // 成功解析的题目
                                    console.log(`✓ 解析题目 ${number}: ${title}`);
                                } else if (title === parts[1]) { // 链接格式不匹配
                                    console.log(`✗ 跳过题目 ${number}: 链接格式不匹配 - ${parts[1]}`);
                                } else {
                                    console.log(`✗ 跳过题目 ${number}: 标题为空`);
                                }
                            }

                            if (!isNaN(number) && title) {
                                problems.push({
                                    number: number,
                                    title: title,
                                    slug: slug, // 添加slug字段
                                    difficulty: getDifficultyClass(difficulty),
                                    tags: tags,
                                    notes: notes,
                                    stage: currentStage,
                                    week: currentWeek,
                                    day: currentDay
                                });
                            }
                        }
                    }
                }

                return problems;
            }

            // 获取难度对应的CSS类名
            function getDifficultyClass(difficulty) {
                if (difficulty.includes('🟢') || difficulty.includes('简单')) return 'easy';
                if (difficulty.includes('🟡') || difficulty.includes('中等')) return 'medium';
                if (difficulty.includes('🔴') || difficulty.includes('困难')) return 'hard';
                return 'medium'; // 默认中等
            }

            // 加载已完成的题目
            function loadCompletedProblems() {
                const saved = localStorage.getItem('leetcode-completed-problems');
                if (saved) {
                    try {
                        completedProblems = JSON.parse(saved);
                        // 转换旧格式为新格式
                        if (Array.isArray(completedProblems)) {
                            // 旧格式：数组
                            const newFormat = {};
                            completedProblems.forEach(num => {
                                newFormat[num] = { attempts: 1, hasSolution: false };
                            });
                            completedProblems = newFormat;
                        } else {
                            // 检查是否是新格式，如果是数字则转换为对象格式
                            Object.keys(completedProblems).forEach(key => {
                                const value = completedProblems[key];
                                if (typeof value === 'number') {
                                    completedProblems[key] = { attempts: value, hasSolution: false };
                                } else if (typeof value === 'object' && !value.hasOwnProperty('attempts')) {
                                    completedProblems[key] = { attempts: 1, hasSolution: false };
                                }
                            });
                        }
                    } catch (e) {
                        console.error('加载完成状态失败:', e);
                        completedProblems = {};
                    }
                }
            }

            // 保存已完成的题目
            function saveCompletedProblems() {
                localStorage.setItem('leetcode-completed-problems', JSON.stringify(completedProblems));
            }

            // 倒计时相关变量
            let countdownInterval;

            // 初始化倒计时
            function initCountdown() {
                const targetDate = new Date('2026-03-15T00:00:00');

                function updateCountdown() {
                    const now = new Date();
                    const diff = targetDate - now;

                    if (diff <= 0) {
                        // 时间已到
                        $('#days').text('00');
                        $('#hours').text('00');
                        $('#minutes').text('00');
                        $('#seconds').text('00');
                        $('#countdown-message').text('🎉 跳槽时间到了！准备出发！');
                        clearInterval(countdownInterval);
                        return;
                    }

                    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                    $('#days').text(days.toString().padStart(2, '0'));
                    $('#hours').text(hours.toString().padStart(2, '0'));
                    $('#minutes').text(minutes.toString().padStart(2, '0'));
                    $('#seconds').text(seconds.toString().padStart(2, '0'));

                    // 根据剩余天数显示不同消息
                    if (days > 30) {
                        $('#countdown-message').text('时间还很充足，稳步前进！');
                    } else if (days > 7) {
                        $('#countdown-message').text('进入冲刺阶段，加油！');
                    } else if (days > 0) {
                        $('#countdown-message').text('最后几天了，坚持就是胜利！');
                    } else {
                        $('#countdown-message').text('今天就是跳槽日！准备好迎接新挑战吧！');
                    }
                }

                // 立即更新一次
                updateCountdown();

                // 每秒更新一次
                countdownInterval = setInterval(updateCountdown, 1000);
            }


            // 初始化事件处理器
            function initEventHandlers() {
                // 计数器按钮点击处理
                $(document).on('click', '.counter-btn', function(e) {
                    e.preventDefault();
                    const problemNumber = parseInt($(this).data('problem'));
                    const action = $(this).data('action');

                    if (action === 'start') {
                        // 标记完成
                        completedProblems[problemNumber] = { attempts: 1, hasSolution: false };
                        showMessage(`题目 ${problemNumber} 已标记为完成！`, 'success');
                    } else if (action === 'increase') {
                        // 增加练习次数
                        if (!completedProblems[problemNumber]) {
                            completedProblems[problemNumber] = { attempts: 0, hasSolution: false };
                        }
                        completedProblems[problemNumber].attempts++;
                        showMessage(`题目 ${problemNumber} 练习次数 +1`, 'success');
                    } else if (action === 'decrease') {
                        // 减少练习次数
                        if (completedProblems[problemNumber].attempts > 1) {
                            completedProblems[problemNumber].attempts--;
                            showMessage(`题目 ${problemNumber} 练习次数 -1`, 'success');
                        } else if (completedProblems[problemNumber].attempts === 1) {
                            // 直接减少到0次，移除记录
                            delete completedProblems[problemNumber];
                            showMessage(`题目 ${problemNumber} 练习记录已移除`, 'success');
                        }
                    }

                    saveCompletedProblems();
                    renderContent();
                    updateStats();
                });

                // 题解复选框处理
                $(document).on('change', '.solution-checkbox', function() {
                    const problemNumber = parseInt($(this).data('problem'));
                    const isChecked = this.checked;

                    if (!completedProblems[problemNumber]) {
                        completedProblems[problemNumber] = { attempts: 0, hasSolution: false };
                    }

                    completedProblems[problemNumber].hasSolution = isChecked;
                    saveCompletedProblems();
                    renderContent();
                    updateStats();

                    const action = isChecked ? '标记为已看过题解' : '取消题解标记';
                    showMessage(`题目 ${problemNumber} ${action}`, 'success');
                });

                // 全选按钮
                $('#select-all-btn').click(function() {
                    if (confirm('确定要将所有题目标记为已练习1次吗？')) {
                        problems.forEach(problem => {
                            if (!completedProblems[problem.number]) {
                                completedProblems[problem.number] = 1;
                            }
                        });
                        saveCompletedProblems();
                        renderContent();
                        updateStats();
                        showMessage('已将所有题目标记为练习1次', 'success');
                    }
                });

                // 全部完成按钮
                $('#complete-all-btn').click(function() {
                    if (confirm('确定要将所有题目标记为已完成吗？（用于测试进度条）')) {
                        console.log(`开始标记全部完成，problems数组长度: ${problems.length}`);
                        let markedCount = 0;
                        problems.forEach(problem => {
                            if (problem && problem.number) {
                                completedProblems[problem.number] = { attempts: 1, hasSolution: false };
                                markedCount++;
                                console.log(`标记题目 ${problem.number}: ${problem.title}`);
                            } else {
                                console.log(`跳过无效题目:`, problem);
                            }
                        });
                        console.log(`标记完成，实际标记 ${markedCount} 个题目，completedProblems长度: ${Object.keys(completedProblems).length}`);
                        saveCompletedProblems();
                        renderContent();
                        updateStats();
                        showMessage(`已将 ${markedCount} 个题目标记为完成`, 'success');
                    }
                });

                // 清空按钮
                $('#clear-all-btn').click(function() {
                    if (confirm('确定要清空所有标记吗？此操作不可撤销。')) {
                        completedProblems = {};
                        saveCompletedProblems();
                        renderContent();
                        updateStats();
                        showMessage('已清空所有标记', 'success');
                    }
                });

                // 导出按钮
                $('#export-btn').click(function() {
                    const data = {
                        timestamp: new Date().toISOString(),
                        totalProblems: problems.length,
                        completedProblems: completedProblems,
                        completionStats: {
                            uniqueCompleted: Object.keys(completedProblems).filter(key => completedProblems[key] > 0).length,
                            totalAttempts: Object.values(completedProblems).reduce((sum, count) => sum + count, 0)
                        }
                    };

                    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `leetcode-progress-${new Date().toISOString().split('T')[0]}.json`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);

                    showMessage('数据已导出', 'success');
                });
            }

            // 初始化页面
            function initPage() {
                problems = parseMarkdownContent();
                console.log(`初始化完成: 共解析 ${problems.length} 个题目`);
                loadCompletedProblems();
                initCountdown(); // 初始化倒计时
                initEventHandlers(); // 初始化事件处理器
                renderContent();
                updateStats();
            }

            // 渲染内容
            function renderContent() {
                // 按照阶段、周、天组织题目
                const stages = {};
                problems.forEach(problem => {
                    if (!stages[problem.stage]) {
                        stages[problem.stage] = {};
                    }
                    if (!stages[problem.stage][problem.week]) {
                        stages[problem.stage][problem.week] = {};
                    }
                    if (!stages[problem.stage][problem.week][problem.day]) {
                        stages[problem.stage][problem.week][problem.day] = [];
                    }
                    stages[problem.stage][problem.week][problem.day].push(problem);
                });

                let html = '';

                Object.keys(stages).forEach(stageTitle => {
                    html += `<div class="stage-section">`;
                    html += `<div class="stage-header">${stageTitle}</div>`;

                    Object.keys(stages[stageTitle]).forEach(weekTitle => {
                        html += `<h4 style="padding: 15px 20px; margin: 0; background: #f8f9fa; border-bottom: 1px solid #dee2e6;">${weekTitle}</h4>`;

                        Object.keys(stages[stageTitle][weekTitle]).forEach(dayTitle => {
                            const dayProblems = stages[stageTitle][weekTitle][dayTitle];
                            if (dayProblems.length > 0) {
                                html += `<h5 style="padding: 10px 20px; margin: 0; background: #e9ecef; border-bottom: 1px solid #dee2e6; font-size: 0.9em; font-weight: normal;">${dayTitle}</h5>`;
                                html += `<table class="problems-table">`;
                                html += `<thead><tr><th>题号</th><th>题目</th><th>难度</th><th>标签</th><th>备注</th></tr></thead>`;
                                html += `<tbody>`;

                                dayProblems.forEach(problem => {
                                    const problemData = completedProblems[problem.number] || { attempts: 0, hasSolution: false };
                                    const completionCount = problemData.attempts;
                                    const hasSolution = problemData.hasSolution;
                                    const isCompleted = completionCount > 0;
                                    const completedClass = isCompleted ? 'completed' : '';
                                    const completedBadge = isCompleted ? '<span class="completed-badge">✓</span>' : '';
                                    const solutionBadge = hasSolution ? '<span class="solution-badge">解</span>' : '';

                                    html += `<tr class="${completedClass}" data-problem="${problem.number}">`;
                                    html += `<td class="problem-number">${problem.number}</td>`;
                                    html += `<td class="problem-title">`;
                                    html += `<div class="problem-actions">`;
                                    html += `<a href="https://leetcode.cn/problems/${problem.slug}/" target="_blank">${problem.title}</a>${completedBadge}${solutionBadge}`;
                                    if (isCompleted) {
                                        html += `<div class="completion-counter">`;
                                        html += `<button class="counter-btn" data-action="decrease" data-problem="${problem.number}" ${completionCount <= 1 ? 'disabled' : ''}>-</button>`;
                                        html += `<span class="counter-display">${completionCount}</span>`;
                                        html += `<button class="counter-btn" data-action="increase" data-problem="${problem.number}">+</button>`;
                                        html += `</div>`;
                                        html += `<div class="solution-section">`;
                                        html += `<label class="solution-checkbox-label">`;
                                        html += `<input type="checkbox" class="solution-checkbox" data-problem="${problem.number}" ${hasSolution ? 'checked' : ''}>`;
                                        html += `<span class="solution-text">看过题解</span>`;
                                        html += `</label>`;
                                        html += `</div>`;
                                    } else {
                                        html += `<button class="counter-btn start-btn" data-action="start" data-problem="${problem.number}">标记完成</button>`;
                                    }
                                    html += `</div>`;
                                    html += `</td>`;
                                    html += `<td><span class="difficulty ${problem.difficulty}">${getDifficultyText(problem.difficulty)}</span></td>`;
                                    html += `<td class="tags">${problem.tags}</td>`;
                                    html += `<td class="notes">${problem.notes}</td>`;
                                    html += `</tr>`;
                                });

                                html += `</tbody></table>`;
                            }
                        });
                    });

                    html += `</div>`;
                });

                $('#content').html(html);
            }

            // 更新统计信息
            function updateStats() {
                const total = problems.length;
                const completed = Object.keys(completedProblems).filter(key => (completedProblems[key].attempts || 0) > 0).length;
                const totalAttempts = Object.values(completedProblems).reduce((sum, data) => sum + (data.attempts || 0), 0);
                const hasSolution = Object.keys(completedProblems).filter(key => completedProblems[key].hasSolution).length;
                const rate = total > 0 ? (completed / total) * 100 : 0;

                // 调试信息
                console.log(`统计信息: 总数=${total}, 已完成=${completed}, 看过题解=${hasSolution}, 总练习次数=${totalAttempts}, 完成率=${rate.toFixed(2)}%`);

                $('#total-problems').text(total);
                $('#completed-problems').text(`${completed} (${totalAttempts}次练习, ${hasSolution}题解)`);
                $('#completion-rate').text(Math.round(rate) + '%');

                // 更新进度条，确保100%时正确显示
                const progressWidth = Math.min(Math.round(rate * 100) / 100, 100);
                $('#progress-fill').css('width', progressWidth + '%');

                console.log(`进度条宽度: ${progressWidth}%`);
            }


            // 获取难度文本
            function getDifficultyText(difficulty) {
                const map = {
                    'easy': '🟢简单',
                    'medium': '🟡中等',
                    'hard': '🔴困难'
                };
                return map[difficulty] || difficulty;
            }


            // 显示消息
            function showMessage(text, type) {
                const $msg = $('#status-message');
                $msg.removeClass('success error').addClass(type).text(text).show();
                setTimeout(() => $msg.fadeOut(), 3000);
            }

            // 页面卸载时清理倒计时
            $(window).on('beforeunload', function() {
                if (countdownInterval) {
                    clearInterval(countdownInterval);
                }
            });

            // 初始化
            initPage();
        });
    </script>
</body>
</html>
